<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>SST カード - 学校のよくある場面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Hiragino Maru Gothic ProN", "BIZ UDPGothic", "Meiryo", sans-serif;
  background: #fff9f0;
  min-height: 100vh;
  padding: 20px;
}

h1.app-title {
  text-align: center;
  font-size: 1.8rem;
  color: #ff7043;
  margin-bottom: 6px;
  letter-spacing: 2px;
}

p.app-subtitle {
  text-align: center;
  font-size: 1rem;
  color: #888;
  margin-bottom: 24px;
}

/* ナビ（旧・場面一覧。児童には非表示） */
.nav-bar { display: none; }

/* 教師用 隠しボタン（タイトルの星アイコン） */
.star-trigger {
  background: transparent;
  border: none;
  font-size: inherit;
  line-height: 1;
  cursor: pointer;
  padding: 0 2px;
  vertical-align: middle;
  color: inherit;
  font-family: inherit;
  transition: transform 0.15s;
}

.star-trigger:hover,
.star-trigger:focus {
  transform: scale(1.15) rotate(-8deg);
  outline: none;
}

/* 共通 非表示クラス */
.hidden { display: none !important; }

/* スタート画面 */
.start-screen {
  max-width: 520px;
  margin: 16px auto 0;
}

.start-inner {
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
  padding: 44px 24px 36px;
  text-align: center;
}

.start-text {
  font-size: 1.25rem;
  color: #555;
  line-height: 1.7;
  margin-bottom: 28px;
}

.btn-start {
  background: #ff7043;
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 18px 56px;
  font-size: 1.4rem;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 0 rgba(191, 54, 12, 0.4);
  transition: transform 0.1s, box-shadow 0.1s;
  font-family: inherit;
}

.btn-start:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 rgba(191, 54, 12, 0.4);
}

.start-hint {
  margin-top: 18px;
  font-size: 0.85rem;
  color: #999;
}

@media (max-width: 480px) {
  .start-text { font-size: 1.1rem; }
  .btn-start { font-size: 1.2rem; padding: 16px 44px; }
}

/* 教師用モーダル */
.teacher-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  align-items: flex-start;
  justify-content: center;
  z-index: 100;
  padding: 24px 12px;
  overflow-y: auto;
}

.teacher-modal.open {
  display: flex;
}

.teacher-modal-inner {
  background: #fff;
  border-radius: 18px;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
}

.teacher-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 2px solid #ffe0b2;
  background: #fff;
}

.teacher-modal-header h2 {
  font-size: 1.1rem;
  color: #e65100;
  margin: 0;
}

.teacher-close {
  background: #ffe0b2;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  font-size: 1.3rem;
  color: #e65100;
  cursor: pointer;
  font-weight: bold;
}

.scene-list {
  list-style: none;
  padding: 12px;
  margin: 0;
  overflow-y: auto;
  flex: 1;
}

.scene-list-item {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 8px;
  background: #fff8ee;
  border: 2px solid #ffe0b2;
  border-radius: 12px;
  cursor: pointer;
  font-size: 1rem;
  text-align: left;
  color: #333;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: inherit;
}

.scene-list-item:hover,
.scene-list-item:focus {
  background: #ffe0b2;
  outline: none;
}

.scene-list-item .sl-no {
  background: #ff7043;
  color: #fff;
  border-radius: 999px;
  padding: 2px 10px;
  font-size: 0.8rem;
  font-weight: bold;
  flex-shrink: 0;
  min-width: 36px;
  text-align: center;
}

.scene-list-item .sl-cat {
  color: #888;
  font-size: 0.75rem;
  display: block;
  margin-top: 2px;
}

.scene-list-item .sl-title-wrap {
  flex: 1;
}

.scene-list-item .sl-title {
  font-weight: bold;
  line-height: 1.3;
}

.scene-list-item.active {
  background: #ffcc80;
  border-color: #ff7043;
}

.scene-list-item.selected {
  background: #c8e6c9;
  border-color: #66bb6a;
}

.scene-list-item .sl-mark {
  margin-left: auto;
  background: #66bb6a;
  color: #fff;
  border-radius: 999px;
  padding: 2px 10px;
  font-size: 0.75rem;
  font-weight: bold;
  flex-shrink: 0;
  display: none;
}

.scene-list-item.selected .sl-mark {
  display: inline-block;
}

/* 教師用トースト（子どもにヒントを与えない汎用表現） */
.selection-toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #66bb6a;
  color: #fff;
  padding: 12px 24px;
  border-radius: 14px;
  font-size: 1rem;
  font-weight: bold;
  z-index: 200;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
}

.selection-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* カードラッパ */
.card-container {
  max-width: 1100px;
  margin: 0 auto;
}

/* カード本体 */
.card {
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.10);
  overflow: hidden;
  padding-bottom: 28px;
}

/* カテゴリバッジ */
.category-badge {
  display: inline-block;
  background: #ffe0b2;
  color: #e65100;
  font-size: 0.85rem;
  font-weight: bold;
  border-radius: 999px;
  padding: 4px 14px;
  margin: 20px 0 0 20px;
}

/* イラスト */
.illust-wrap {
  background: #fff8ee;
  margin: 12px 20px 0;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 180px;
  overflow: hidden;
}

.illust-wrap img {
  width: 100%;
  height: auto;
  display: block;
}

/* 場面タイトル */
.scene-title {
  font-size: 1.35rem;
  font-weight: bold;
  color: #333;
  margin: 18px 20px 8px;
  line-height: 1.4;
}

/* 場面説明 */
.scene-desc {
  font-size: 1rem;
  color: #555;
  margin: 0 20px 16px;
  line-height: 1.7;
}

/* 吹き出し */
.balloon-wrap {
  margin: 0 20px 20px;
}

.balloon-label {
  font-size: 0.8rem;
  color: #ff7043;
  font-weight: bold;
  margin-bottom: 4px;
}

.balloon {
  position: relative;
  background: #fff3e0;
  border: 3px solid #ff7043;
  border-radius: 16px;
  padding: 14px 18px;
  font-size: 1.25rem;
  font-weight: bold;
  color: #bf360c;
  line-height: 1.5;
  display: inline-block;
  min-width: 60%;
}

.balloon::before {
  content: "";
  position: absolute;
  top: -20px;
  left: 28px;
  border: 10px solid transparent;
  border-bottom-color: #ff7043;
}

.balloon::after {
  content: "";
  position: absolute;
  top: -14px;
  left: 30px;
  border: 8px solid transparent;
  border-bottom-color: #fff3e0;
}

/* 考える問い */
.questions {
  margin: 0 20px 22px;
  background: #e8f5e9;
  border-radius: 14px;
  padding: 14px 18px;
}

.questions-title {
  font-size: 0.85rem;
  color: #388e3c;
  font-weight: bold;
  margin-bottom: 8px;
}

.questions li {
  list-style: none;
  font-size: 1rem;
  color: #2e7d32;
  padding: 4px 0;
  padding-left: 22px;
  position: relative;
  line-height: 1.5;
}

.questions li::before {
  content: "💭";
  position: absolute;
  left: 0;
}

/* ボタンエリア */
.btn-area {
  display: flex;
  gap: 12px;
  margin: 0 20px;
  justify-content: center;
}

.btn-prev, .btn-next {
  flex: 1;
  padding: 14px 0;
  border: none;
  border-radius: 999px;
  font-size: 1.05rem;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}

.btn-prev:active, .btn-next:active {
  transform: scale(0.97);
}

.btn-prev {
  background: #f5f5f5;
  color: #999;
}

.btn-next {
  background: #ff7043;
  color: #fff;
}

.btn-prev:disabled {
  opacity: 0.4;
  cursor: default;
}

/* ホームに戻るボタン（カード下部・メイン） */
.end-area {
  margin: 20px 20px 4px;
  text-align: center;
}

.btn-end {
  background: #66bb6a;
  border: none;
  color: #fff;
  border-radius: 999px;
  padding: 14px 36px;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 0 rgba(46, 125, 50, 0.4);
  transition: transform 0.1s, box-shadow 0.1s;
}

.btn-end:hover {
  background: #43a047;
}

.btn-end:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 rgba(46, 125, 50, 0.4);
}

/* カード上部の小さなホームボタン（右上に常駐） */
.card { position: relative; }

.btn-home-corner {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid #ffcc80;
  color: #e65100;
  font-size: 1.2rem;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  padding: 0;
  line-height: 1;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
}

.btn-home-corner:hover {
  background: #ffe0b2;
}

.btn-home-corner:active {
  transform: scale(0.95);
}

/* ページ番号 */
.page-indicator {
  text-align: center;
  margin-top: 18px;
  display: flex;
  gap: 8px;
  justify-content: center;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ffd0b5;
  transition: background 0.2s;
}

.dot.active {
  background: #ff7043;
}

@media (max-width: 480px) {
  h1.app-title { font-size: 1.4rem; }
  .scene-title { font-size: 1.15rem; }
  .balloon { font-size: 1.1rem; }
}

/* ===== PC・電子黒板用 横置きレイアウト ===== */
@media (min-width: 769px) {
  /* カード全体を横並びに */
  .card-layout {
    display: flex;
    flex-direction: row;
    align-items: stretch;
  }

  /* 左カラム：挿絵 */
  .card-image-col {
    flex: 0 0 46%;
  }

  .card-image-col .illust-wrap {
    margin: 0;
    border-radius: 0;
    min-height: 440px;
    height: 100%;
  }

  .card-image-col .illust-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  /* SVGフォールバック用 */
  .card-image-col .illust-wrap svg {
    width: 100%;
    height: 100%;
  }

  /* 右カラム：テキスト情報 */
  .card-content-col {
    flex: 1;
    padding: 20px 28px 16px;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow-y: auto;
  }

  /* 右カラム内の各要素の余白を上書き */
  .card-content-col .category-badge {
    margin: 0 0 12px;
  }

  .card-content-col .scene-title {
    margin: 0 0 8px;
  }

  .card-content-col .scene-desc {
    margin: 0 0 14px;
  }

  .card-content-col .balloon-wrap {
    margin: 0 0 18px;
  }

  .card-content-col .questions {
    margin: 0;
  }
}

/* スマホは縦並びを維持 */
@media (max-width: 768px) {
  .card-container {
    max-width: 520px;
  }
}
</style>
</head>
<body>

<h1 class="app-title"><button class="star-trigger" id="teacherTrigger" aria-label="教師用メニュー" title="教師用">🌟</button> SST カード</h1>
<p class="app-subtitle">学校のよくある場面を考えよう</p>

<!-- スタート画面 -->
<div class="start-screen" id="startScreen">
  <div class="start-inner">
    <p class="start-text">きょうの場面カードを<br>みてみよう！</p>
    <button class="btn-start" id="btnStart" type="button">スタート ▶</button>
    <p class="start-hint">押すと場面がランダムで出ます</p>
  </div>
</div>

<!-- 教師用 場面えらびモーダル -->
<div class="teacher-modal" id="teacherModal" aria-hidden="true">
  <div class="teacher-modal-inner" role="dialog" aria-modal="true">
    <div class="teacher-modal-header">
      <h2>場面をえらぶ（教師用）</h2>
      <button class="teacher-close" id="teacherClose" aria-label="閉じる">×</button>
    </div>
    <p style="margin: 6px 18px 0; font-size: 0.85rem; color: #888;">
      えらぶとスタートで表示されます。何もえらばない場合はランダムです。
    </p>
    <ul class="scene-list" id="sceneList"></ul>
    <div style="padding: 0 18px 16px;">
      <button id="teacherReset" type="button"
        style="width: 100%; background: #fff; border: 2px solid #ffe0b2; color: #e65100; border-radius: 999px; padding: 10px; font-size: 0.95rem; cursor: pointer; font-family: inherit;">
        ランダムに戻す
      </button>
    </div>
  </div>
</div>

<!-- 教師用 控えめトースト（子どもに内容が伝わらない表現） -->
<div class="selection-toast" id="selectionToast" aria-live="polite"></div>

<div class="card-container hidden" id="cardContainer" style="display: none;">
  <div class="card" id="mainCard">
    <button class="btn-home-corner" id="btnHomeCorner" type="button" aria-label="ホームに戻る" title="ホームに戻る">🏠</button>
    <div class="card-layout">
      <!-- 左カラム：挿絵 -->
      <div class="card-image-col">
        <div class="illust-wrap" id="cardIllust"></div>
      </div>
      <!-- 右カラム：テキスト情報 -->
      <div class="card-content-col">
        <span class="category-badge" id="cardCategory"></span>
        <div class="scene-title" id="cardTitle"></div>
        <div class="scene-desc" id="cardDesc"></div>
        <div class="balloon-wrap">
          <div class="balloon-label">👤 はじめの一言</div>
          <div class="balloon" id="cardBalloon"></div>
        </div>
        <div class="questions">
          <div class="questions-title">🤔 考えてみよう</div>
          <ul id="cardQuestions"></ul>
        </div>
      </div>
    </div>
    <div class="btn-area">
      <button class="btn-prev" id="btnPrev" onclick="move(-1)" disabled>◀ もどる</button>
      <button class="btn-next" id="btnNext" onclick="move(1)" disabled>つぎへ ▶</button>
    </div>
    <div class="end-area">
      <button class="btn-end" id="btnEnd" type="button">🏠 おわる（ホームへ）</button>
    </div>
  </div>
  <div class="page-indicator" id="pageIndicator"></div>
</div>

// -------- カード表示ロジック --------
let current = 0;

function renderCard(idx) {
  const s = scenes[idx];

  document.getElementById("cardCategory").textContent = s.category;

  const illustEl = document.getElementById("cardIllust");
  if (s.img) {
    illustEl.innerHTML = `<img src="${s.img}" alt="${s.title}">`;
  } else {
    illustEl.innerHTML = s.svg;
  }
  document.getElementById("cardTitle").textContent = s.title;
  document.getElementById("cardDesc").textContent = s.desc;
  document.getElementById("cardBalloon").textContent = s.firstWord;

  const ul = document.getElementById("cardQuestions");
  ul.innerHTML = "";
  s.questions.forEach(q => {
    const li = document.createElement("li");
    li.textContent = q;
    ul.appendChild(li);
  });

  document.getElementById("btnPrev").disabled = (idx === 0);
  document.getElementById("btnNext").disabled = (idx === scenes.length - 1);
  if (idx === scenes.length - 1) {
    document.getElementById("btnNext").textContent = "さいご ✓";
  } else {
    document.getElementById("btnNext").textContent = "つぎへ ▶";
  }

  // ドット更新
  const dots = document.querySelectorAll(".dot");
  dots.forEach((d, i) => d.classList.toggle("active", i === idx));

  // カードをふわっと表示
  const card = document.getElementById("mainCard");
  card.style.opacity = "0";
  card.style.transform = "translateY(10px)";
  requestAnimationFrame(() => {
    card.style.transition = "opacity 0.3s ease, transform 0.3s ease";
    card.style.opacity = "1";
    card.style.transform = "translateY(0)";
  });
}

function move(dir) {
  const next = current + dir;
  if (next < 0 || next >= scenes.length) return;
  current = next;
  renderCard(current);
}

function showCard() {
  const start = document.getElementById("startScreen");
  const cont = document.getElementById("cardContainer");
  start.classList.add("hidden");
  start.style.display = "none";
  cont.classList.remove("hidden");
  cont.style.display = ""; // inline display:none を解除
}

// 起動時：必ずトップ画面のみ表示し、カードは隠す
function showStart() {
  const start = document.getElementById("startScreen");
  const cont = document.getElementById("cardContainer");
  start.classList.remove("hidden");
  start.style.display = "";
  cont.classList.add("hidden");
  cont.style.display = "none";
}

function goTo(idx) {
  showCard();
  current = idx;
  renderCard(current);
}

// スタート：教師が事前選択していればそれ、なければランダム
document.getElementById("btnStart").addEventListener("click", () => {
  let idx;
  if (selectedSceneIdx !== null) {
    idx = selectedSceneIdx;
    selectedSceneIdx = null; // 一度きりで使い切る
  } else {
    idx = Math.floor(Math.random() * scenes.length);
  }
  goTo(idx);
});

// 「ランダムに戻す」（教師用）
document.getElementById("teacherReset").addEventListener("click", () => {
  selectedSceneIdx = null;
  closeTeacherModal();
  showSelectionToast("✓ リセットしました");
});

// 「おわる」：場面を終えてホーム（トップ画面）に戻る
function goHome() {
  showStart();
}
document.getElementById("btnEnd").addEventListener("click", goHome);
document.getElementById("btnHomeCorner").addEventListener("click", goHome);

// 教師が事前に選択した場面 index（null = ランダム）
let selectedSceneIdx = null;

// 控えめトースト（場面名は出さない）
function showSelectionToast(msg) {
  const t = document.getElementById("selectionToast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showSelectionToast._tid);
  showSelectionToast._tid = setTimeout(() => t.classList.remove("show"), 1400);
}

// 教師用モーダル：場面リスト生成
function buildSceneList() {
  const list = document.getElementById("sceneList");
  list.innerHTML = "";
  scenes.forEach((s, i) => {
    const li = document.createElement("li");
    const btn = document.createElement("button");
    let cls = "scene-list-item";
    if (i === selectedSceneIdx) cls += " selected";
    btn.className = cls;
    btn.type = "button";
    btn.innerHTML =
      '<span class="sl-no">' + (i + 1) + '</span>' +
      '<span class="sl-title-wrap">' +
        '<span class="sl-title"></span>' +
        '<span class="sl-cat"></span>' +
      '</span>' +
      '<span class="sl-mark">えらび中</span>';
    btn.querySelector(".sl-title").textContent = s.title;
    btn.querySelector(".sl-cat").textContent = s.category;
    btn.onclick = () => {
      // 場面は表示せず、選択だけ保存。スタート押下で表示される。
      selectedSceneIdx = i;
      closeTeacherModal();
      showStart(); // カードを念のため隠してトップ画面に戻す
      showSelectionToast("✓ えらびました");
    };
    li.appendChild(btn);
    list.appendChild(li);
  });
}

// 教師用モーダル：開閉
const teacherModal = document.getElementById("teacherModal");
function openTeacherModal() {
  // 開くたびに active 状態を更新
  buildSceneList();
  teacherModal.classList.add("open");
  teacherModal.setAttribute("aria-hidden", "false");
}
function closeTeacherModal() {
  teacherModal.classList.remove("open");
  teacherModal.setAttribute("aria-hidden", "true");
}

document.getElementById("teacherTrigger").addEventListener("click", openTeacherModal);
document.getElementById("teacherClose").addEventListener("click", closeTeacherModal);
// 背景タップで閉じる
teacherModal.addEventListener("click", (e) => {
  if (e.target === teacherModal) closeTeacherModal();
});
// Esc キーで閉じる
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeTeacherModal();
});

// ページドット生成
function buildDots() {
  const pi = document.getElementById("pageIndicator");
  scenes.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === 0 ? " active" : "");
    d.onclick = () => goTo(i);
    d.style.cursor = "pointer";
    pi.appendChild(d);
  });
}

buildDots();
showStart(); // 起動時は必ずトップ画面のみ

</script>
